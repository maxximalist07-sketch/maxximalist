<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2c08d;
            --burgundy: #4a0e0e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--burgundy); 
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        /* NAVIGATION BAR */
        .navbar {
            width: 100%;
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            padding: 30px 0 25px 0;
            box-sizing: border-box;
            z-index: 10;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0 auto;
            padding: 0 5%; 
            justify-content: space-evenly; 
            align-items: center;
            max-width: 900px; 
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
        }

        /* MAIN CONTENT AREA */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .brand-symbol {
            max-height: 120px; 
            width: auto;
            margin-bottom: 25px; 
            opacity: 0.9;
        }

        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--gold); 
            font-size: clamp(3.5rem, 15vw, 8.5rem);
            letter-spacing: -0.02em;
            margin: 0;
            text-align: center;
        }

        .tagline {
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.8;
        }

        .separator-line {
            width: 60px;
            height: 1px;
            background-color: var(--gold);
            opacity: 0.4;
            margin-top: 35px;
        }

        /* POPUP MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 5, 5, 0.9); /* Darker version of your background */
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px); /* Softens the background logo */
        }

        .modal-content {
            background-color: var(--burgundy);
            border: 1px solid var(--gold);
            padding: 40px;
            max-width: 500px;
            width: 80%;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            color: var(--gold);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: var(--gold);
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.9;
            letter-spacing: 0.05em;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--gold);
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .navbar { padding: 50px 0 20px 0; }
            .nav-links a { font-size: 10px; letter-spacing: 0.15em; }
            .brand-symbol { max-height: 90px; }
            .modal-content { padding: 25px; width: 85%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a onclick="toggleAbout()">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <img src="https://image2url.com/r2/default/images/1774475442899-b6e9e45a-b829-440f-a057-e31a87f5c5fa.png" alt="Symbol" class="brand-symbol">
        <h1 class="brand-title">Maxximalist</h1>
        <p class="tagline">Shop the Unlimited</p>
        <div class="separator-line"></div>
    </main>

    <div class="modal-overlay" id="aboutModal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleAbout()">&times;</span>
            <h2>About Us</h2>
            <p>
                Maxximalist is a curated space for those who believe more is more. 
                We bring together an unlimited collection of bold identities and refined goods. 
                Our mission is to celebrate variety through an editorial lens.
            </p>
        </div>
    </div>

    <script>
        function toggleAbout() {
            const modal = document.getElementById('aboutModal');
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
            }
        }

        // Close modal if user clicks anywhere outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('aboutModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
