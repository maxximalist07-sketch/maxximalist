<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&family=Montserrat:wght@300&display=swap');

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    height: 100%;
    width: 100%;
    background-color: #4a0404;
    overflow: hidden;
  }

  .main-wrapper {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #4a0404 0%, #200101 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
  }

  /* Navigation Bar */
  .nav {
    width: 100%;
    padding: 40px 0;
    display: flex;
    justify-content: center;
    gap: 50px;
    z-index: 10;
  }

  .nav a, .nav span {
    color: #d4af37;
    text-decoration: none;
    text-transform: uppercase;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    opacity: 0.8;
    cursor: pointer;
  }

  /* Main Title Area */
  .center-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-top: -60px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 100px;
    color: #f3cf8c;
    margin: 0;
    font-weight: 400;
    letter-spacing: -2px;
    text-shadow: 0px 0px 12px rgba(243, 207, 140, 0.2);
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: #d4af37;
    letter-spacing: 14px;
    text-transform: lowercase;
    margin-top: 15px;
    opacity: 0.7;
  }

  /* POPUP STYLING */
  #aboutPopup {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85); /* Dark blur effect */
    z-index: 100;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
  }

  .popup-content {
    background: #f5f1e9; /* Cream color to contrast red */
    padding: 60px;
    max-width: 500px;
    text-align: center;
    position: relative;
    border: 1px solid #d4af37;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .popup-content h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: #4a0404;
    font-size: 32px;
    margin-bottom: 20px;
  }

  .popup-content p {
    font-family: 'Montserrat', sans-serif;
    color: #333;
    line-height: 1.8;
    font-size: 14px;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 20px;
    color: #4a0404;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
  }
</style>

<div class="main-wrapper">
  <nav class="nav">
    <a href="#">Home</a>
    <span onclick="openPopup()">About</span>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>

  <div class="center-content">
    <h1 class="title">Maxximalist</h1>
    <p class="tagline">shop the limitless</p>
  </div>
</div>

<div id="aboutPopup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">✕</span>
    <h2>Our Story</h2>
    <p>
      At Maxximalist, we believe that more is more. Our collection is a curated journey through the bold, the rare, and the limitless. We don't just sell items; we provide pieces of an expansive identity.
    </p>
  </div>
</div>

<script>
  function openPopup() {
    document.getElementById("aboutPopup").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("aboutPopup").style.display = "none";
  }
</script>
