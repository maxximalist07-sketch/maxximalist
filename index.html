<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2c08d;
            --burgundy: #4a0e0e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--burgundy); 
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NAVIGATION BAR */
        .navbar {
            width: 100%;
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            padding: 25px 0;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0 auto;
            padding: 0 5%; /* Side safety margin */
            /* This spreads them perfectly across the available space */
            justify-content: space-evenly; 
            align-items: center;
            max-width: 900px; /* Prevents links from drifting too far on giant monitors */
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .nav-links {
                padding: 0 2%;
            }
            .nav-links a {
                font-size: 10px; /* Smaller font to ensure no wrap/cutoff */
                letter-spacing: 0.15em; /* Tighter for small screens */
            }
        }

        /* LOGO AREA */
        .content-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--gold); 
            font-size: clamp(3rem, 15vw, 8rem);
            letter-spacing: -0.02em;
            margin: 0;
            user-select: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <h1 class="brand-title">Maxximalist</h1>
    </main>

</body>
</html>
