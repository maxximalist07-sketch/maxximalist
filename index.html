<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4a0e0e; 
            background: radial-gradient(circle, #5e1313 0%, #2b0808 100%);
            overflow: hidden;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            /* Explicitly set to normal weight */
            font-weight: 400; 
            color: #e2c08d; 
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 0.02em;
            text-rendering: optimizeLegibility;
            /* Removed text-shadow (glow) */
            text-shadow: none; 
            user-select: none;
        }
    </style>
</head>
<body>

    <h1 class="brand-title">Maxximalist</h1>

</body>
</html>
