<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXXIMALIST | Shop the Unlimited</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <nav class="top-nav">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="#shop">SHOP</a></li>
                <li><a href="#about">ABOUT</a></li>
                <li><a href="#contact">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <picture>
            <source media="(min-width: 800px)" srcset="https://i.ibb.co/4ZbtDmGP/IMG-0862.png">
            <img src="https://i.ibb.co/99d2fm6J/IMG-0867.png" alt="Maxximalist Home" class="hero-img">
        </picture>
        
        <div class="hero-overlay">
            <h1 class="fade-in">MAXXIMALIST</h1>
            <p class="fade-in-delay">Shop the unlimited</p>
        </div>
    </section>

    <section id="shop" class="content-section">
        <h2 class="section-title">Shop by Mood</h2>
        <div class="mood-filters">
            <button onclick="filterMood('all')">ALL</button>
            <button onclick="filterMood('bold')">BOLD</button>
            <button onclick="filterMood('elegant')">ELEGANT</button>
        </div>
        <div id="product-grid" class="grid">
            </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
