<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXXIMALIST | Shop the Unlimited</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora&display=swap" rel="stylesheet">
    
    <style>
        /* Reset all default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #000;
            font-family: 'Lora', serif;
            overflow-x: hidden;
        }

        /* Fixed Navigation Bar - Deep Green */
        .main-header {
            background-color: #0a140a; 
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            border-bottom: 1px solid #1a2e1a;
        }

        .top-nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 0;
        }

        .top-nav li {
            margin: 0 30px;
        }

        .top-nav a {
            color: #d4af37;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .top-nav a:hover {
            color: #ffffff;
        }

        /* Hero Section - Fixed to fill the full screen */
        .hero-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
        }

        /* This is the fix for the small image issue */
        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This forces it to fill the laptop screen */
            display: block;
        }

        picture {
            width: 100%;
            height: 100%;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .top-nav ul {
                padding: 15px 0;
            }
            .top-nav li {
                margin: 0 10px;
            }
            .top-nav a {
                font-size: 10px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <nav class="top-nav">
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">SHOP</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-container">
        <picture>
            <source media="(min-width: 800px)" srcset="https://i.ibb.co/4ZbtDmGP/IMG-0862.png">
            <img src="https://i.ibb.co/99d2fm6J/IMG-0867.png" alt="Maxximalist Home" class="hero-image">
        </picture>
    </main>

</body>
</html>
