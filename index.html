<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2c08d;
            --burgundy: #4a0e0e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--burgundy); 
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NAVIGATION BAR */
        .navbar {
            width: 100%;
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            padding: 30px 0 25px 0;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0 auto;
            padding: 0 5%; 
            justify-content: space-evenly; 
            align-items: center;
            max-width: 900px; 
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        /* MAIN CONTENT AREA */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* BRAND SYMBOL */
        .brand-symbol {
            max-height: 120px; 
            width: auto;
            margin-bottom: 25px; 
            opacity: 0.9;
        }

        /* LOGO STYLE */
        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--gold); 
            font-size: clamp(3.5rem, 15vw, 8.5rem);
            letter-spacing: -0.02em;
            margin: 0;
            user-select: none;
            text-align: center;
        }

        /* TAGLINE STYLE */
        .tagline {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.5em; /* Extra wide for an editorial feel */
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* THE SEPARATOR LINE */
        .separator-line {
            width: 60px;
            height: 1px;
            background-color: var(--gold);
            opacity: 0.4;
            margin-top: 35px;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .navbar {
                padding: 50px 0 20px 0; 
            }
            .nav-links a {
                font-size: 10px; 
                letter-spacing: 0.15em; 
            }
            .brand-symbol {
                max-height: 90px;
                margin-bottom: 15px;
            }
            .tagline {
                font-size: 9px;
                letter-spacing: 0.3em;
            }
            .separator-line {
                width: 40px;
                margin-top: 25px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <img src="https://image2url.com/r2/default/images/1774475442899-b6e9e45a-b829-440f-a057-e31a87f5c5fa.png" alt="Maxximalist Symbol" class="brand-symbol">
        
        <h1 class="brand-title">Maxximalist</h1>
        
        <p class="tagline">Shop the Unlimited</p>
        
        <div class="separator-line"></div>
    </main>

</body>
</html>
