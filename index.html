<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #4a0e0e;
            --gold: #e2c08d;
            --dark-gradient: #1a0505;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--burgundy); 
            background: radial-gradient(circle, #5e1313 0%, var(--dark-gradient) 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* The Navigation Bar */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(226, 192, 141, 0.2); /* Thin gold line */
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 60px; /* Space between links */
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.4em; /* Wide spacing as seen in your image */
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        /* Centered Logo Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--gold); 
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            letter-spacing: -0.01em; 
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <h1 class="brand-title">Maxximalist</h1>
    </main>

</body>
</html>
