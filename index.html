<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2c08d;
            --burgundy: #4a0e0e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--burgundy); 
            /* Radial gradient matching the lighting in your photos */
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NAVIGATION BAR */
        .navbar {
            width: 100%;
            /* Subtle divider line */
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            padding: 25px 0;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0 auto;
            /* Side safety padding to prevent edge-clipping */
            padding: 0 5%; 
            /* Spreads links evenly across the screen */
            justify-content: space-evenly; 
            align-items: center;
            /* Prevents links from spreading too wide on large desktop screens */
            max-width: 900px; 
        }

        .nav-links li {
            display: inline-block;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            /* Wide letter spacing for an elegant, high-end look */
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        /* MOBILE ADJUSTMENTS - Ensures no cropping on phones */
        @media (max-width: 600px) {
            .nav-links {
                padding: 0 2%;
            }
            .nav-links a {
                /* Smaller font and spacing so everything fits perfectly on mobile */
                font-size: 10px; 
                letter-spacing: 0.15em; 
            }
        }

        /* MAIN CONTENT AREA */
        .content-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* LOGO STYLE */
        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400; /* Unbolded as requested */
            color: var(--gold); 
            /* Scales smoothly from mobile to desktop */
            font-size: clamp(3rem, 15vw, 8rem);
            letter-spacing: -0.02em;
            margin: 0;
            text-shadow: none; /* No glow as requested */
            user-select: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <h1 class="brand-title">Maxximalist</h1>
    </main>

</body>
</html>
