<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2c08d;
            --burgundy: #4a0e0e;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--burgundy); 
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            font-family: 'Cinzel', serif;
            color: var(--gold);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        .navbar {
            width: 100%;
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            padding: 30px 0 25px 0;
            box-sizing: border-box;
            z-index: 10;
            position: sticky;
            top: 0;
            background: rgba(74, 14, 14, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0 auto;
            padding: 0 5%; 
            justify-content: space-evenly; 
            align-items: center;
            max-width: 900px; 
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
        }

        /* MAIN PAGE ARRIVALS SECTION */
        .new-arrivals-section {
            width: 100%;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 10%;
            box-sizing: border-box;
            border-top: 1px solid rgba(226, 192, 141, 0.2);
        }

        .arrivals-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            gap: 50px;
        }

        .arrivals-text { flex: 1; text-align: left; }

        .arrivals-image-slot {
            flex: 1;
            aspect-ratio: 4/5;
            border: 1px solid rgba(226, 192, 141, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .arrivals-image-slot img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .explore-btn {
            padding: 15px 40px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
        }

        .explore-btn:hover { background: var(--gold); color: var(--burgundy); }

        /* MODAL OVERLAY */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 5, 5, 0.98);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        .modal-content-wide {
            width: 95%;
            max-width: 1100px;
            padding: 80px 40px 60px 40px;
            position: relative;
            background: transparent;
        }

        /* THE CLOSE BUTTON (X) */
        .close-arrivals {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 45px;
            font-weight: 200;
            cursor: pointer;
            color: var(--gold);
            line-height: 1;
            transition: all 0.3s ease;
            z-index: 110;
        }

        .close-arrivals:hover {
            transform: scale(1.1);
            opacity: 0.6;
        }

        /* CAROUSEL GRID */
        .carousel-track {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 20px 0;
        }

        .product-card {
            text-align: left;
            border: 1px solid rgba(226, 192, 141, 0.15);
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            transition: border-color 0.3s;
        }

        .product-card:hover { border-color: var(--gold); }

        .card-img-slot {
            width: 100%;
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .card-img-slot img { width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 1.4rem;
            margin: 0 0 10px 0;
        }

        .card-desc {
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        /* MOBILE FIXES */
        @media (max-width: 900px) {
            .carousel-track { grid-template-columns: 1fr; }
            .modal-content-wide { padding-top: 60px; height: 85vh; overflow-y: auto; }
            .arrivals-container { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a onclick="openArrivals()">New Arrivals</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="new-arrivals-section">
        <div class="arrivals-container">
            <div class="arrivals-text">
                <span style="font-size: 10px; letter-spacing: 0.5em; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 20px;">The Latest Drop</span>
                <h2 style="font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 4rem; margin: 0 0 30px 0;">New Arrivals</h2>
                <button class="explore-btn" onclick="openArrivals()">Explore Collection</button>
            </div>
            <div class="arrivals-image-slot">
                <img src="https://via.placeholder.com/800x1000/2a0505/e2c08d?text=Featured+Arrival" alt="Arrivals">
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="arrivalsModal">
        <div class="modal-content-wide">
            
            <span class="close-arrivals" onclick="closeArrivals()">&times;</span>
            
            <h2 style="letter-spacing: 0.4em; text-transform: uppercase; font-size: 14px; margin-bottom: 40px; text-align: center;">The New Arrivals</h2>
            
            <div class="carousel-track">
                <div class="product-card">
                    <div class="card-img-slot">
                        <img src="https://via.placeholder.com/400/2a0505/e2c08d?text=Item+01" alt="Product">
                    </div>
                    <h3 class="card-title">Velvet Dusk</h3>
                    <p class="card-desc">Hand-stitched velvet with deep crimson undertones.</p>
                </div>

                <div class="product-card">
                    <div class="card-img-slot">
                        <img src="https://via.placeholder.com/400/2a0505/e2c08d?text=Item+02" alt="Product">
                    </div>
                    <h3 class="card-title">Golden Relic</h3>
                    <p class="card-desc">Antique gold finishes meet modern silhouettes.</p>
                </div>

                <div class="product-card">
                    <div class="card-img-slot">
                        <img src="https://via.placeholder.com/400/2a0505/e2c08d?text=Item+03" alt="Product">
                    </div>
                    <h3 class="card-title">Midnight Silk</h3>
                    <p class="card-desc">Seamless silk drape in an obsidian palette.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openArrivals() {
            document.getElementById('arrivalsModal').style.display = "flex";
            document.body.style.overflow = "hidden"; // Stops background scrolling
        }

        function closeArrivals() {
            document.getElementById('arrivalsModal').style.display = "none";
            document.body.style.overflow = "auto"; // Re-enables scrolling
        }

        // Close when clicking the dark background
        window.onclick = function(event) {
            let modal = document.getElementById('arrivalsModal');
            if (event.target == modal) {
                closeArrivals();
            }
        }
    </script>

</body>
</html>
