<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxximalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #4a0e0e;
            --gold: #e2c08d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #5e1313 0%, #1a0505 100%);
            background-color: var(--burgundy); 
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        /* The Navigation Bar */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 10px;
            border-bottom: 1px solid rgba(226, 192, 141, 0.15);
            width: 100%;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            /* Smaller gap for mobile, larger for desktop */
            gap: clamp(15px, 4vw, 50px); 
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            /* Fluid font size for nav */
            font-size: clamp(10px, 2.5vw, 14px); 
            letter-spacing: 0.2em; 
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Centered Logo Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .brand-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--gold); 
            /* Scaled down to ensure it fits on small screens */
            font-size: clamp(2.5rem, 15vw, 7rem);
            letter-spacing: -0.02em; 
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Shop</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="content-area">
        <h1 class="brand-title">Maxximalist</h1>
    </main>

</body>
</html>
